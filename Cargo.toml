[package]
name = "ximea_camera"
version = "0.1.0"
edition = "2021"
authors = ["Elhanan Buchsbaum"]

[dependencies]
xiapi = { git = "https://github.com/elhananby/xiapi.git" }
anyhow = "1.0.86"
clap = { version = "4.5.4", features = ["derive"] }
crossbeam = "0.8"
crossbeam-channel = "0.5"
derive_more = "0.99"
env_logger = "0.11.3"
futures = "0.3"
image = "0.24.8"
log = "0.4.21"
rand = "0.8.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.28", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
zmq = "0.10.0"
ctrlc = "3.4.4"
rayon = "1.10.0"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'